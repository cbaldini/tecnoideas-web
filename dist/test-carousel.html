<!DOCTYPE html>
<html>
<head>
    <title>Test Carrusel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f0f0f0;
        }

        .test-section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        img {
            max-width: 100%;
            height: auto;
            border: 2px solid #ccc;
            margin: 10px 0;
        }

        .carousel {
            width: 100%;
            height: 56.25vw; /* 16:9 */
            max-height: 600px;
            min-height: 300px;
            background: #ddd;
            position: relative;
            overflow: hidden;
            margin: 20px 0;
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #0052cc;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
            border: none;
            cursor: pointer;
        }

        .dot.active {
            background: #0066ff;
        }

        .log {
            background: #1a1a1a;
            color: #0f0;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>🧪 Test del Carrusel Tecnoideas</h1>

    <div class="test-section">
        <h2>1. Verificar si las imágenes existen</h2>
        <p>Imagen 1 (flyer-webs):</p>
        <img src="img/tecnoideas-flyer-webs.png" alt="Flyer Webs" onerror="console.log('ERROR: No se cargó flyer-webs')">

        <p>Imagen 2 (flyer-apps):</p>
        <img src="img/tecnoideas-flyer-apps.png" alt="Flyer Apps" onerror="console.log('ERROR: No se cargó flyer-apps')">
    </div>

    <div class="test-section">
        <h2>2. Carrusel Simulado</h2>
        <div class="carousel" id="testCarousel">
            <div class="slide active">
                <img src="img/tecnoideas-flyer-webs.png" alt="Slide 1">
            </div>
            <div class="slide">
                <img src="img/tecnoideas-flyer-apps.png" alt="Slide 2">
            </div>
        </div>

        <div class="controls">
            <button onclick="previousSlide()">← Anterior</button>
            <button class="dot active" onclick="goToSlide(0)"></button>
            <button class="dot" onclick="goToSlide(1)"></button>
            <button onclick="nextSlide()">Siguiente →</button>
        </div>

        <div class="log" id="log"></div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        const log = document.getElementById('log');

        function addLog(msg) {
            console.log(msg);
            const timestamp = new Date().toLocaleTimeString();
            log.innerHTML += `[${timestamp}] ${msg}\n`;
            log.scrollTop = log.scrollHeight;
        }

        function showSlide(index) {
            currentSlide = index % slides.length;

            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));

            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');

            addLog(`✨ Mostrando slide ${currentSlide + 1}/${slides.length}`);
        }

        function nextSlide() {
            showSlide(currentSlide + 1);
        }

        function previousSlide() {
            showSlide(currentSlide - 1 + slides.length);
        }

        function goToSlide(n) {
            showSlide(n);
        }

        // Auto-advance cada 4 segundos
        let autoTimer = setInterval(nextSlide, 4000);

        addLog(`🎠 Test iniciado: ${slides.length} slides detectados`);
    </script>
</body>
</html>
